<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 신청 카드</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f4f7f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* 메인 화면 컨테이너 */
        .main-wrapper {
            width: 100%;
            max-width: 500px; /* 이미지 최대 폭 제한 */
            display: flex;
            flex-direction: column;
            align-items: center; /* 가로 중앙 정렬 */
        }

        /* 메인 이미지 스타일 */
        .header-container {
            width: 100%;
            margin-bottom: 25px; /* 이미지와 버튼 사이 간격 */
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            line-height: 0;
        }
    
        .title-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 수정된 가입신청 버튼 */
        .open-btn {
            width: 80%; /* 이미지 폭의 80% */
            padding: 20px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px; /* 둥근 버튼 스타일 */
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.4);
            
            /* 글자 강조 및 크기 조절 */
            font-size: 24px; /* 기존 약 16px의 1.5배 */
            font-weight: 900; /* 아주 굵게 강조 */
            letter-spacing: -0.5px;
            transition: transform 0.2s;
        }

        .open-btn:active {
            transform: scale(0.95); /* 터치 시 눌리는 효과 */
        }

        /* 모달 공통 스타일 (기존 유지) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: flex-end;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 25px 25px 0 0;
            padding: 25px;
            max-height: 92vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; font-size: 15px; }
        
        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
        }

        .radio-group { display: flex; gap: 15px; }
        .radio-item { display: flex; align-items: center; gap: 8px; font-size: 16px; }

        .agreement-box {
            background: #f1f3f5;
            padding: 15px;
            border-radius: 10px;
            font-size: 13px;
            line-height: 1.6;
            color: #666;
            margin: 20px 0;
        }

        .check-group { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }

        .btn-group { display: flex; gap: 12px; }
        .btn-group button {
            flex: 1;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: bold;
        }
        .submit-btn { background: var(--primary-color); color: white; }
        .close-btn { background: #e9ecef; color: #495057; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- 메인 이미지 -->
        <div class="header-container">
            <img src="img/SignUp_Main.jpg" alt="메인 배너" class="title-img">
        </div>
        <!-- 이미지 대비 80% 폭의 강조된 버튼 -->
        <button class="open-btn" onclick="toggleModal(true)">교육 신청하기</button>
    </div>

    <!-- 모달 창 (내용 동일) -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="header-container">
                <img src="img/SignUp.jpg" alt="신청 타이틀" class="title-img">
            </div>

            <form id="applyForm">
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" placeholder="성함을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="gender" value="남" required> 남성</label>
                        <label class="radio-item"><input type="radio" name="gender" value="여"> 여성</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>나이</label>
                    <select required>
                        <option value="">선택하세요</option>
                        <option value="30대">30대</option>
                        <option value="40대">40대</option>
                        <option value="50대">50대</option>
                        <option value="60대 이상">60대 이상</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>전화번호</label>
                    <input type="tel" placeholder="010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label>주소</label>
                    <input type="text" placeholder="주소를 입력하세요" required>
                </div>

                <div class="agreement-box">
                    <label class="check-group">
                        <input type="checkbox" required>
                        <span>
                            귀하는 본 설문에 개인정보(이름, 전화번호)가 활용되는 것에 동의합니다. 
                            처리된 개인정보는 세미나 목적으로만 사용되며 [법률 제 148395호]에 의해 다른 용도나 목적으로 사용할 수 없습니다.
                        </span>
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="close-btn" onclick="toggleModal(false)">닫기</button>
                    <button type="submit" class="submit-btn">신청합니다</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('modal');
            modal.style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('신청이 성공적으로 접수되었습니다.');
            toggleModal(false);
        });
    </script>
</body>
</html>
