<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 신청 카드</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-gradient: linear-gradient(180deg, #FFF0F5 0%, #FFFFFF 100%);
            --accent-color: #00A86B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* 메인 화면 */
        .main-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            line-height: 0;
        }
    
        .title-img { width: 100%; height: auto; display: block; }

        .open-btn {
            width: 80%;
            padding: 18px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 24px;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
        }

        /* 모달 배경 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* 모달 창 */
        .modal-content {
            background: white;
            width: 95%;
            max-width: 450px; 
            border-radius: 20px;
            padding: 25px;
            max-height: 95vh;
            overflow-y: auto;
        }

        /* 폼 항목 1.2배 글자 크기 적용 */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .form-group label {
            width: 90px;
            flex-shrink: 0;
            font-weight: bold;
            font-size: 18px;
            color: #333;
        }
        
        input[type="text"], input[type="tel"], select {
            flex: 1;
            padding: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 18px;
            background: #fafafa;
        }

        .radio-group { flex: 1; display: flex; gap: 15px; }
        .radio-item { display: flex; align-items: center; gap: 8px; font-size: 18px; cursor: pointer; }
        .radio-item input { width: 20px; height: 20px; }

        /* 동의서 섹션 (요청하신 스타일) */
        .agreement-section {
            background: #fdfdfd;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #f0f0f0;
        }

        /* 버튼 */
        .btn-group { display: flex; gap: 10px; margin-top: 15px; }
        .btn-group button {
            flex: 1;
            padding: 18px;
            border-radius: 12px;
            border: none;
            font-size: 19px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn { background: var(--primary-color); color: white; }
        .close-btn { background: #f0f0f0; color: #666; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-container">
            <img src="img/SignUp_Main.jpg" alt="메인" class="title-img">
        </div>
        <button class="open-btn" onclick="toggleModal(true)">교육 신청하기</button>
    </div>

    <!-- 신청 모달 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="header-container" style="margin-bottom: 20px; border-radius: 10px; box-shadow: none;">
                <img src="img/SignUp.jpg" alt="신청 타이틀" class="title-img">
            </div>

            <form id="applyForm">
                <div class="form-group">
                    <label>성명</label>
                    <input type="text" id="swal-input-name" placeholder="성함을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="gender" value="남" required> 남성</label>
                        <label class="radio-item"><input type="radio" name="gender" value="여"> 여성</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>나이</label>
                    <select id="swal-input-age" required>
                        <option value="">선택하세요</option>
                        <option value="30대">30대</option>
                        <option value="40대">40대</option>
                        <option value="50대">50대</option>
                        <option value="60대 이상">60대 이상</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>전화번호</label>
                    <!-- 요청하신 ID 적용된 전화번호 필드 -->
                    <input type="tel" id="swal-input-phone" placeholder="010-0000-0000" maxlength="13" required>
                </div>

                <div class="form-group">
                    <label>주소</label>
                    <input type="text" id="swal-input-address" placeholder="상세주소를 입력하세요" required>
                </div>

                <!-- 동의서 섹션 -->
                <div class="agreement-section">
                    <div style="font-size:16px; font-weight:bold; color:#444; margin-bottom:8px;">[개인정보처리동의서]</div>
                    <div style="font-size:14px; color:#777; line-height:1.5; letter-spacing:-0.3px;">
                        귀하는 본 설문에 개인정보(이름, 전화번호)가 활용되는 것에 동의합니다. 
                        처리된 개인정보는 세미나 목적으로만 사용되며 [법률 제 148395호]에 의해 다른 용도나 목적으로 사용할 수 없습니다.
                    </div>
                    
                    <label style="display:flex; align-items:center; margin-top:12px; cursor:pointer; font-size:17px; color:#333; font-weight:bold;">
                        <input type="checkbox" id="swal-input-agree" required
                               style="margin:0 8px 0 0; width:22px; height:22px; accent-color:#00A86B;">
                        <span>동의합니다</span>
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="close-btn" onclick="toggleModal(false)">닫기</button>
                    <button type="submit" class="submit-btn" id="submit-button">신청합니다</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 구글 스크립트 웹앱 URL (GAS 배포 후 생성된 URL을 여기에 입력하세요)
        const GAS_APP_URL = "여기에_URL을_입력하세요";

        function toggleModal(show) {
            const modal = document.getElementById('modal');
            modal.style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        /* 1. 전화번호 하이픈 자동 삽입 로직 (요청사항 반영) */
        const phoneInput = document.getElementById('swal-input-phone');
        phoneInput.addEventListener('input', (e) => {
            let val = e.target.value.replace(/[^0-9]/g, '');
            if (val.length <= 3) e.target.value = val;
            else if (val.length <= 7) e.target.value = val.slice(0, 3) + '-' + val.slice(3);
            else e.target.value = val.slice(0, 3) + '-' + val.slice(3, 7) + '-' + val.slice(7, 11);
        });

        /* 2. 폼 제출 및 구글 시트 연동 로직 (JSON 데이터 전송) */
        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submit-button');
            submitBtn.innerText = "전송 중...";
            submitBtn.disabled = true;

            // JSON 형태로 데이터 수집
            const formData = {
                name: document.getElementById('swal-input-name').value,
                gender: document.querySelector('input[name="gender"]:checked').value,
                age: document.getElementById('swal-input-age').value,
                phone: document.getElementById('swal-input-phone').value,
                address: document.getElementById('swal-input-address').value
            };

            // 구글 시트로 POST 전송
            fetch(GAS_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(formData)
            })
            .then(() => {
                alert('신청이 완료되었습니다. 감사합니다!');
                submitBtn.innerText = "신청합니다";
                submitBtn.disabled = false;
                e.target.reset();
                toggleModal(false);
            })
            .catch(error => {
                console.error('Error:', error);
                alert('전송 중 오류가 발생했습니다.');
                submitBtn.disabled = false;
            });
        });
    </script>
</body>
</html>
