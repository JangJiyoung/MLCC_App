<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 신청 카드</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            /* 배경 그라데이션 색상 정의 */
            --bg-gradient: linear-gradient(180deg, #FFF0F5 0%, #FFFFFF 100%);
            --accent-color: #00A86B;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            /* 연한 분홍색 -> 흰색 그라데이션 적용 */
            background: var(--bg-gradient);
            background-attachment: fixed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* 메인 화면 */
        .main-wrapper {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            line-height: 0;
        }
    
        .title-img { width: 100%; height: auto; display: block; }

        .open-btn {
            width: 80%;
            padding: 18px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 24px;
            font-weight: 900;
            box-shadow: 0 5px 15px rgba(74, 144, 226, 0.3);
            transition: transform 0.2s ease;
        }

        .open-btn:active { transform: scale(0.95); }

        /* 모달 배경 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* 모달 창 */
        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px; 
            border-radius: 20px;
            padding: 20px;
            max-height: 95vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        /* 가로 정렬 폼 스타일 */
        .form-group {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .form-group label {
            width: 75px; 
            flex-shrink: 0;
            font-weight: bold;
            font-size: 15px;
            color: #333;
        }
        
        input[type="text"], input[type="tel"], select {
            flex: 1;
            padding: 12px;
            border: 1px solid #eee;
            border-radius: 8px;
            font-size: 15px;
            background: #fafafa;
        }

        .radio-group { flex: 1; display: flex; gap: 15px; }
        .radio-item { display: flex; align-items: center; gap: 5px; font-size: 15px; cursor: pointer; }

        /* 동의서 영역 */
        .agreement-section {
            background: #fdfdfd;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border: 1px solid #f0f0f0;
        }

        /* 하단 버튼 */
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-group button {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn { background: var(--primary-color); color: white; }
        .close-btn { background: #f0f0f0; color: #666; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <!-- 메인 이미지 -->
        <div class="header-container">
            <img src="img/SignUp_Main.jpg" alt="메인" class="title-img">
        </div>
        <!-- 1.5배 강조된 버튼 -->
        <button class="open-btn" onclick="toggleModal(true)">교육 신청하기</button>
    </div>

    <!-- 모달 창 -->
    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <div class="header-container" style="margin-bottom: 20px; border-radius: 10px; box-shadow: none;">
                <img src="img/SignUp.jpg" alt="신청 타이틀" class="title-img">
            </div>

            <form id="applyForm">
                <div class="form-group">
                    <label>성명</label>
                    <input type="text" placeholder="성함을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="gender" value="남" required> 남성</label>
                        <label class="radio-item"><input type="radio" name="gender" value="여"> 여성</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>나이</label>
                    <select required>
                        <option value="">선택하세요</option>
                        <option value="30대">30대</option>
                        <option value="40대">40대</option>
                        <option value="50대">50대</option>
                        <option value="60대 이상">60대 이상</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>전화번호</label>
                    <input type="tel" placeholder="010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label>주소</label>
                    <input type="text" placeholder="상세주소를 입력하세요" required>
                </div>

                <!-- 동의서 섹션 -->
                <div class="agreement-section">
                    <div style="font-size:0.75rem; font-weight:bold; color:#444; margin-bottom:5px;">[개인정보처리동의서]</div>
                    <div style="font-size:0.7rem; color:#777; line-height:1.4; letter-spacing:-0.3px;">
                        귀하는 본 설문에 개인정보(이름, 전화번호)가 활용되는 것에 동의합니다. 
                        처리된 개인정보는 세미나 목적으로만 사용되며 [법률 제 148395호]에 의해 다른 용도나 목적으로 사용할 수 없습니다.
                    </div>
                    
                    <label style="display:flex; align-items:center; margin-top:10px; cursor:pointer; font-size:0.85rem; color:#333; font-weight:bold; line-height:1;">
                        <input type="checkbox" id="swal-input-agree" required
                               style="margin:0 8px 0 0; width:18px; height:18px; accent-color:#00A86B; cursor:pointer; vertical-align:middle;">
                        <span>동의합니다</span>
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="close-btn" onclick="toggleModal(false)">닫기</button>
                    <button type="submit" class="submit-btn">신청합니다</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('modal');
            modal.style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            if(!document.getElementById('swal-input-agree').checked) {
                alert('개인정보 동의에 체크해 주세요.');
                return;
            }
            alert('신청이 성공적으로 접수되었습니다!');
            toggleModal(false);
        });
    </script>
</body>
</html>
