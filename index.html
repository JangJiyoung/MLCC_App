<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 신청 카드</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f4f7f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* 메인 버튼 (시작 화면) */
        .open-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        /* 모달 배경 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            justify-content: center;
            align-items: flex-end; /* 모바일에서 하단에서 올라오는 느낌 */
            z-index: 1000;
        }

        /* 모달 창 */
        .modal-content {
            background: white;
            width: 100%;
            max-width: 500px;
            border-radius: 20px 20px 0 0;
            padding: 20px;
            max-height: 90vh;
            overflow-y: auto;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        /* 타이틀 이미지 영역 */
        .header-img {
            width: 100%;
            height: 120px;
            background: #eee url('https://via.placeholder.com') no-repeat center/cover;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        /* 폼 스타일 */
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        
        input[type="text"], input[type="tel"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px; /* 모바일 확대 방지 */
        }

        .radio-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .radio-item { flex: 1 1 40%; display: flex; align-items: center; gap: 5px; }

        /* 약관 영역 */
        .agreement-box {
            background: #f9f9f9;
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            line-height: 1.5;
            color: #555;
            margin-bottom: 15px;
        }

        .check-group { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; }
        .check-group input { margin-top: 3px; }

        /* 버튼 영역 */
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-group button {
            flex: 1;
            padding: 15px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn { background: var(--primary-color); color: white; }
        .close-btn { background: #eee; color: #333; }
    </style>
</head>
<body>

    <button class="open-btn" onclick="toggleModal(true)">교육 신청하기</button>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <!-- 타이틀 이미지 -->
            <div class="header-img"></div>

            <form id="applyForm">
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" placeholder="성함을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="gender" value="남"> 남성</label>
                        <label class="radio-item"><input type="radio" name="gender" value="여"> 여성</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>나이</label>
                    <select required>
                        <option value="">선택하세요</option>
                        <option value="30대">30대</option>
                        <option value="40대">40대</option>
                        <option value="50대">50대</option>
                        <option value="60대 이상">60대 이상</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>전화번호</label>
                    <input type="tel" placeholder="010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label>주소</label>
                    <input type="text" placeholder="주소를 입력하세요" required>
                </div>

                <div class="agreement-box">
                    <label class="check-group">
                        <input type="checkbox" required>
                        <span>
                            귀하는 본 설문에 개인정보(이름, 전화번호)가 활용되는 것에 동의합니다. 
                            처리된 개인정보는 세미나 목적으로만 사용되며 [법률 제 148395호]에 의해 다른 용도나 목적으로 사용할 수 없습니다.
                        </span>
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="close-btn" onclick="toggleModal(false)">닫기</button>
                    <button type="submit" class="submit-btn">신청합니다</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('modal');
            modal.style.display = show ? 'flex' : 'none';
            // 모달 열릴 때 바디 스크롤 방지
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('신청이 완료되었습니다!');
            toggleModal(false);
        });
    </script>
</body>
</html>
