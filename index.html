<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 신청 카드</title>
    <style>
        :root {
            --primary-color: #4A90E2;
            --bg-color: #f4f7f9;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Pretendard', sans-serif; }

        body {
            background-color: var(--bg-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 20px;
        }

        /* 메인 화면 */
        .main-wrapper {
            width: 100%;
            max-width: 450px; /* 이미지의 최대 폭 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-container {
            width: 100%;
            margin-bottom: 25px;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
            line-height: 0;
        }
    
        .title-img { width: 100%; height: auto; display: block; }

        .open-btn {
            width: 80%;
            padding: 18px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-size: 24px;
            font-weight: 900;
        }

        /* 모달 배경 */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            justify-content: center;
            align-items: center; /* 중앙 정렬 */
            z-index: 1000;
        }

        /* 모달 창: 이미지 폭에 맞춰 너비 고정 */
        .modal-content {
            background: white;
            width: 90%;
            max-width: 450px; /* 이미지 폭과 동일하게 설정 */
            border-radius: 20px;
            padding: 20px;
            max-height: 95vh;
            overflow-y: auto;
        }

        /* 가로 정렬 폼 스타일 */
        .form-group {
            display: flex;
            align-items: center; /* 세로 중앙 */
            margin-bottom: 12px;
        }

        .form-group label {
            width: 80px; /* 레이블 너비 고정 */
            flex-shrink: 0;
            font-weight: bold;
            font-size: 15px;
            color: #333;
        }
        
        .form-group input, 
        .form-group select,
        .form-group .radio-group {
            flex: 1; /* 남은 공간 모두 차지 */
        }

        input[type="text"], input[type="tel"], select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            width: 100%;
        }

        .radio-group { display: flex; gap: 15px; }
        .radio-item { display: flex; align-items: center; gap: 5px; font-size: 15px; }

        /* 약관 및 버튼 */
        .agreement-box {
            background: #f8f9fa;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            line-height: 1.5;
            color: #666;
            margin: 15px 0;
        }
        .check-group { display: flex; align-items: flex-start; gap: 8px; cursor: pointer; }

        .btn-group { display: flex; gap: 10px; }
        .btn-group button {
            flex: 1;
            padding: 14px;
            border-radius: 8px;
            border: none;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .submit-btn { background: var(--primary-color); color: white; }
        .close-btn { background: #eee; color: #444; }
    </style>
</head>
<body>

    <div class="main-wrapper">
        <div class="header-container">
            <img src="img/SignUp_Main.jpg" alt="메인" class="title-img">
        </div>
        <button class="open-btn" onclick="toggleModal(true)">교육 신청하기</button>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <!-- 모달 상단 이미지 -->
            <div class="header-container" style="margin-bottom: 15px; border-radius: 10px;">
                <img src="img/SignUp.jpg" alt="타이틀" class="title-img">
            </div>

            <form id="applyForm">
                <div class="form-group">
                    <label>이름</label>
                    <input type="text" placeholder="성함을 입력하세요" required>
                </div>

                <div class="form-group">
                    <label>성별</label>
                    <div class="radio-group">
                        <label class="radio-item"><input type="radio" name="gender" value="남" required> 남성</label>
                        <label class="radio-item"><input type="radio" name="gender" value="여"> 여성</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>나이</label>
                    <select required>
                        <option value="">선택</option>
                        <option value="30대">30대</option>
                        <option value="40대">40대</option>
                        <option value="50대">50대</option>
                        <option value="60대 이상">60대 이상</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>전화번호</label>
                    <input type="tel" placeholder="010-0000-0000" required>
                </div>

                <div class="form-group">
                    <label>주소</label>
                    <input type="text" placeholder="상세주소 입력" required>
                </div>

                <div class="agreement-box">
                    <label class="check-group">
                        <input type="checkbox" required>
                        <span>
                            귀하는 본 설문에 개인정보 활용에 동의합니다. 처리된 정보는 세미나 목적으로만 사용되며 법률에 의해 보호됩니다.
                        </span>
                    </label>
                </div>

                <div class="btn-group">
                    <button type="button" class="close-btn" onclick="toggleModal(false)">닫기</button>
                    <button type="submit" class="submit-btn">신청합니다</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleModal(show) {
            const modal = document.getElementById('modal');
            modal.style.display = show ? 'flex' : 'none';
            document.body.style.overflow = show ? 'hidden' : 'auto';
        }

        document.getElementById('applyForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert('신청이 완료되었습니다.');
            toggleModal(false);
        });
    </script>
</body>
</html>
